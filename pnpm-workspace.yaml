# The pnpm workspace for the stella monorepo's web packages. Rust crates are
# NOT pnpm packages — cargo remains their build system and source of truth
# (see the root package.json's rust:* scripts for the pnpm-side bridge).
packages:
  - stella-docs

# pnpm 11 reads build-script approvals from here. Both deps ship prebuilt
# platform binaries via optional deps, so approving their build scripts just
# lets `pnpm install` exit cleanly — which Next 16's pre-build dependency
# check (and Vercel) require.
allowBuilds:
  esbuild: true
  sharp: true

# Pin this Next transitive dep to the previous patch: 2.11.1 (a browser-compat
# DATA release) was published <24h before the `minimumReleaseAge` supply-chain
# cutoff, which fails `pnpm install --frozen-lockfile`. 2.11.0 (published a day
# earlier) is identical in kind and safely aged. Drop this override once Next
# ships a baseline-browser-mapping that clears the release-age window.
overrides:
  baseline-browser-mapping: 2.11.0
